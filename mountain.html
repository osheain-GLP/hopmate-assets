<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
.mtn-card{background:white;border-radius:20px;overflow:hidden;border:1px solid #e4eaf0;margin:0 0 16px 0;position:relative;font-family:sans-serif;}
.mtn-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.mtn-label{font-size:13px;font-weight:700;color:#18232f;}
.mtn-sublabel{font-size:11px;color:#6b7c93;margin-top:2px;}
.score-badge{background:#f2f6f9;border-radius:12px;padding:6px 12px;text-align:center;}
.score-pts{font-size:18px;font-weight:900;color:#18232f;font-family:'Nunito',sans-serif;}
.score-max{font-size:11px;color:#6b7c93;}
.mtn-canvas{width:100%;height:220px;display:block;}
.prog-wrap{padding:10px 16px 14px;}
.prog-outer{height:10px;border-radius:99px;background:#f2f6f9;overflow:hidden;}
.prog-inner{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#6b7c93;font-weight:700;}
.celebration{display:none;position:absolute;inset:0;background:rgba(255,255,255,0.92);border-radius:20px;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.celebration.show{display:flex;}
.cel-emoji{font-size:48px;animation:bounce 0.6s ease infinite alternate;}
.cel-text{font-size:18px;font-weight:900;color:#18232f;margin-top:10px;}
.cel-sub{font-size:12px;color:#6b7c93;margin-top:4px;}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear infinite;opacity:0;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(260px) rotate(720deg);opacity:0}}
@keyframes climber-idle{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-3px) rotate(4deg)}}
@keyframes cloud-float{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
@keyframes cloud2-float{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}
@keyframes flag-wave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes tree-sway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
@keyframes lava-flow{0%{stroke-dashoffset:300}100%{stroke-dashoffset:0}}
@keyframes magma-pulse{0%,100%{opacity:0.7;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.15)}}
@keyframes smoke-rise{0%{transform:translateY(0) scale(1);opacity:0.6}100%{transform:translateY(-40px) scale(2.5);opacity:0}}
@keyframes eruption{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.climber-group{animation:climber-idle 1.8s ease-in-out infinite;transform-origin:center bottom;}
.cloud{animation:cloud-float 4s ease-in-out infinite;}
.cloud2{animation:cloud2-float 5s ease-in-out infinite;}
.dark-cloud{animation:cloud2-float 6s ease-in-out infinite;}
.flag-wave{animation:flag-wave 1s ease-in-out infinite;transform-origin:left center;}
.tree{animation:tree-sway 3s ease-in-out infinite;transform-origin:center bottom;}
.tree2{animation:tree-sway 3.5s ease-in-out infinite 0.5s;transform-origin:center bottom;}
.lava-stream{stroke-dasharray:300;animation:lava-flow 3s linear infinite;}
.magma-blob{animation:magma-pulse 1.5s ease-in-out infinite;transform-origin:center center;}
.smoke1{animation:smoke-rise 2.5s ease-out infinite;}
.smoke2{animation:smoke-rise 2.5s ease-out infinite 0.8s;}
.smoke3{animation:smoke-rise 2.5s ease-out infinite 1.6s;}
.eruption-rock{animation:eruption 0.4s ease-in-out infinite;}
</style>

    <!-- Summit flag -->
    <g id="summit-flag" opacity="0" transform="translate(195,24)">
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#555" stroke-width="2"/>
      <path class="flag-wave" d="M0 -20 L14 -14 L0 -8 Z" fill="#F44336"/>
    </g>

  </svg>

  <div class="prog-wrap">
    <div class="prog-outer">
      <div class="prog-inner" id="prog-bar" style="width:0%;background:linear-gradient(90deg,#66BB7A,#2E7D32);"></div>
    </div>
    <div class="prog-meta">
      <span>現在: <strong id="current-pts">0</strong> pts</span>
      <span id="remain-pts" style="color:#2E7D32">あと <strong>1000 pts</strong> で頂上！</span>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="cel-emoji">🎉</div>
    <div class="cel-text">おめでとう！</div>
    <div class="cel-sub" id="cel-sub">N3の山を制覇しました！</div>
    <div style="margin-top:12px;font-size:22px;">🏔✨🎌</div>
  </div>
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var userScore = parseInt(params.get("score")) || 0;
  var userPhase = params.get("phase") || "n3";
  var maxScore = parseInt(params.get("max")) || 1000;

  var level = userPhase === '介護福祉' ? 'kaigo' : (userPhase === 'N2' ? 'n2' : 'n3');

  function applyTheme(){
    if(level === 'n3'){
      document.getElementById('sky-rect').setAttribute('fill','url(#skyGrad)');
      document.getElementById('mtn-label').textContent = '🌿 N3への道のり';
      document.getElementById('mtn-sublabel').textContent = '日本語能力試験 N3レベル達成まで';
      document.getElementById('cel-sub').textContent = 'N3の山を制覇しました！';
      document.getElementById('mtn-body').setAttribute('fill','url(#mtnGrad)');
      document.getElementById('mtn-bg1').setAttribute('fill','url(#mtnBgGrad)');
      document.getElementById('mtn-bg2').setAttribute('fill','url(#mtnBgGrad)');
      document.getElementById('ground-color').setAttribute('fill','url(#groundGrad)');
      document.getElementById('snow-cap').setAttribute('fill','white');
      document.getElementById('snow-cap').setAttribute('opacity','0.95');
      document.getElementById('mtn-shadow').setAttribute('fill','url(#mtnShadow)');
      document.getElementById('prog-bar').style.background = 'linear-gradient(90deg,#66BB7A,#2E7D32)';
      document.getElementById('remain-pts').style.color = '#2E7D32';
      document.getElementById('ridge-left').setAttribute('stroke','rgba(0,0,0,0.13)');
      document.getElementById('ridge-right').setAttribute('stroke','rgba(0,0,0,0.10)');
      document.getElementById('elev-bands').setAttribute('opacity','0.12');
      // Show/hide layers
      show('tree-group'); show('normal-clouds');
      hide('n2-rocks'); hide('storm-clouds');
      hide('lava-streams'); hide('kaigo-rocks'); hide('ash-clouds');
      hide('stump-group'); hide('lava-glow'); hide('smoke-group'); hide('crater-rim');
      document.getElementById('mtn-body').setAttribute('d','M0 220 L15 220 L195 22 L375 220 Z');
      document.getElementById('mtn-clip-path').setAttribute('d','M0 220 L15 220 L195 22 L375 220 Z');
      document.getElementById('mtn-shadow').setAttribute('d','M195 22 L375 220 L300 220 Z');
      document.getElementById('snow-cap').setAttribute('d','M195 22 L173 68 Q185 55 195 50 Q205 55 217 68 Z');
      document.getElementById('trail-full').setAttribute('d','M195 205 Q155 162 168 118 Q178 85 195 58');
      document.getElementById('trail-progress').setAttribute('d','M195 205 Q155 162 168 118 Q178 85 195 58');
      document.getElementById('ridge-left').setAttribute('d','M15 220 L58 178 L76 188 L108 152 L126 163 L153 122 L169 133 L195 22');
      document.getElementById('ridge-right').setAttribute('d','M375 220 L332 178 L314 188 L282 152 L264 163 L237 122 L221 133 L195 22');

    } else if(level === 'n2'){
      document.getElementById('sky-rect').setAttribute('fill','url(#n2Sky)');
      document.getElementById('mtn-label').textContent = '🔮 N2への道のり';
      document.getElementById('mtn-sublabel').textContent = '日本語能力試験 N2レベル達成まで';
      document.getElementById('cel-sub').textContent = 'N2の山を制覇しました！';
      document.getElementById('mtn-body').setAttribute('fill','url(#n2Mtn)');
      document.getElementById('mtn-bg1').setAttribute('fill','url(#n2Bg)');
      document.getElementById('mtn-bg2').setAttribute('fill','url(#n2Bg)');
      document.getElementById('ground-color').setAttribute('fill','#37474F');
      document.getElementById('snow-cap').setAttribute('fill','#E3F2FD');
      document.getElementById('snow-cap').setAttribute('opacity','0.9');
      document.getElementById('mtn-shadow').setAttribute('fill','url(#n2Shadow)');
      document.getElementById('prog-bar').style.background = 'linear-gradient(90deg,#9575CD,#4A148C)';
      document.getElementById('remain-pts').style.color = '#4A148C';
      document.getElementById('ridge-left').setAttribute('stroke','rgba(0,0,0,0.25)');
      document.getElementById('ridge-right').setAttribute('stroke','rgba(0,0,0,0.22)');
      document.getElementById('elev-bands').setAttribute('opacity','0.18');
      show('n2-rocks'); show('storm-clouds');
      hide('tree-group'); hide('normal-clouds');
      hide('lava-streams'); hide('kaigo-rocks'); hide('ash-clouds');
      hide('stump-group'); hide('lava-glow'); hide('smoke-group'); hide('crater-rim');
      // Jagged N2 mountain
      document.getElementById('mtn-body').setAttribute('d','M0 220 L15 220 L62 182 L88 192 L118 155 L138 168 L162 125 L178 136 L195 22 L212 136 L228 125 L252 168 L272 155 L302 192 L328 182 L375 220 Z');
      document.getElementById('mtn-clip-path').setAttribute('d','M0 220 L15 220 L62 182 L88 192 L118 155 L138 168 L162 125 L178 136 L195 22 L212 136 L228 125 L252 168 L272 155 L302 192 L328 182 L375 220 Z');
      document.getElementById('mtn-shadow').setAttribute('d','M195 22 L375 220 L298 220 Z');
      document.getElementById('snow-cap').setAttribute('d','M195 22 L175 62 Q188 50 195 46 Q202 50 215 62 Z');
      document.getElementById('trail-full').setAttribute('d','M195 205 Q155 162 168 118 Q178 85 195 58');
      document.getElementById('trail-progress').setAttribute('d','M195 205 Q155 162 168 118 Q178 85 195 58');
      document.getElementById('ridge-left').setAttribute('d','M15 220 L62 182 L88 192 L118 155 L138 168 L162 125 L178 136 L195 22');
      document.getElementById('ridge-right').setAttribute('d','M375 220 L328 182 L302 192 L272 155 L252 168 L228 125 L212 136 L195 22');

    } else { // kaigo
      document.getElementById('sky-rect').setAttribute('fill','url(#kaigoSky)');
      document.getElementById('mtn-label').textContent = '🌋 介護福祉士への道のり';
      document.getElementById('mtn-sublabel').textContent = '介護福祉資格取得まで';
      document.getElementById('cel-sub').textContent = '介護福祉資格への山を制覇しました！';
      document.getElementById('mtn-body').setAttribute('fill','url(#kaigoMtn)');
      document.getElementById('mtn-bg1').setAttribute('fill','url(#kaigoGround)');
      document.getElementById('mtn-bg2').setAttribute('fill','url(#kaigoGround)');
      document.getElementById('mtn-bg1').setAttribute('opacity','0.6');
      document.getElementById('mtn-bg2').setAttribute('opacity','0.4');
      document.getElementById('ground-color').setAttribute('fill','url(#kaigoGround)');
      document.getElementById('snow-cap').setAttribute('fill','#FF6F00');
      document.getElementById('snow-cap').setAttribute('opacity','0.9');
      document.getElementById('mtn-shadow').setAttribute('fill','rgba(0,0,0,0.4)');
      document.getElementById('prog-bar').style.background = 'linear-gradient(90deg,#FF6F00,#B71C1C)';
      document.getElementById('remain-pts').style.color = '#B71C1C';
      document.getElementById('ridge-left').setAttribute('stroke','rgba(255,80,0,0.25)');
      document.getElementById('ridge-right').setAttribute('stroke','rgba(255,80,0,0.2)');
      document.getElementById('elev-bands').setAttribute('opacity','0.08');
      show('lava-streams'); show('kaigo-rocks'); show('ash-clouds');
      show('stump-group'); show('lava-glow'); show('smoke-group'); show('crater-rim');
      hide('tree-group'); hide('normal-clouds'); hide('n2-rocks'); hide('storm-clouds');
      // Volcano shape - steep narrow peak
      document.getElementById('mtn-body').setAttribute('d','M0 220 L55 220 L148 108 L175 58 L185 35 L195 18 L205 35 L215 58 L242 108 L335 220 Z');
      document.getElementById('mtn-clip-path').setAttribute('d','M0 220 L55 220 L148 108 L175 58 L185 35 L195 18 L205 35 L215 58 L242 108 L335 220 Z');
      document.getElementById('mtn-shadow').setAttribute('d','M205 35 L335 220 L275 220 Z');
      document.getElementById('snow-cap').setAttribute('d','M195 18 L182 48 Q188 38 195 34 Q202 38 208 48 Z');
      document.getElementById('trail-full').setAttribute('d','M195 205 Q170 165 175 125 Q180 90 195 55');
      document.getElementById('trail-progress').setAttribute('d','M195 205 Q170 165 175 125 Q180 90 195 55');
      document.getElementById('ridge-left').setAttribute('d','M55 220 L95 185 L112 195 L138 162 L155 172 L175 132 L185 142 L195 18');
      document.getElementById('ridge-right').setAttribute('d','M335 220 L295 185 L278 195 L252 162 L235 172 L215 132 L205 142 L195 18');
    }
  }

  function show(id){ document.getElementById(id).setAttribute('opacity','1'); }
  function hide(id){ document.getElementById(id).setAttribute('opacity','0'); }

  function update(){
    var pct = Math.min(userScore / maxScore, 1);
    var cx = 195 + (pct < 0.5 ? (pct * -32) : (-16 + (pct-0.5)*32));
    var cy = 200 - (pct * 152);
    document.getElementById('climber').setAttribute('transform','translate('+cx+','+cy+')');
    document.getElementById('trail-progress').style.strokeDashoffset = 200*(1-pct);
    document.getElementById('prog-bar').style.width = (pct*100)+'%';
    document.getElementById('score-display').textContent = userScore;
    document.getElementById('score-max').textContent = '/ '+maxScore+' pts';
    document.getElementById('current-pts').textContent = userScore;
    var remain = maxScore - userScore;
    document.getElementById('remain-pts').innerHTML = remain > 0
      ? 'あと <strong>'+remain+' pts</strong> で頂上！'
      : '<strong>🎉 頂上達成！</strong>';
    if(pct >= 1){
      document.getElementById('summit-flag').setAttribute('opacity','1');
      document.getElementById('stars').setAttribute('opacity','1');
      showCelebration();
    }
  }

  function showCelebration(){
    var cel = document.getElementById('celebration');
    cel.classList.add('show');
    var wrap = document.getElementById('confetti-wrap');
    wrap.innerHTML = '';
    var colors=['#7BC5C5','#8FD5B0','#FFD54F','#F44336','#7B52AB','#66BB7A','#FF8A65'];
    for(var i=0;i<30;i++){
      var el=document.createElement('div');
      el.className='confetti-piece';
      el.style.left=Math.random()*100+'%';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius=Math.random()>0.5?'50%':'2px';
      el.style.animationDuration=(1.5+Math.random()*2)+'s';
      el.style.animationDelay=(Math.random()*1.5)+'s';
      el.style.width=(6+Math.random()*5)+'px';
      el.style.height=(6+Math.random()*5)+'px';
      wrap.appendChild(el);
    }
    setTimeout(function(){cel.classList.remove('show');},4000);
  }

  applyTheme();
  update();
})();
</script>
