<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
.mtn-card{background:white;border-radius:20px;overflow:hidden;border:1px solid #e4eaf0;margin:0 0 16px 0;position:relative;font-family:sans-serif;}
.mtn-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.mtn-label{font-size:13px;font-weight:700;color:#18232f;}
.mtn-sublabel{font-size:11px;color:#6b7c93;margin-top:2px;}
.score-badge{background:#f2f6f9;border-radius:12px;padding:6px 12px;text-align:center;}
.score-pts{font-size:18px;font-weight:900;color:#18232f;font-family:'Nunito',sans-serif;}
.score-max{font-size:11px;color:#6b7c93;}
.mtn-canvas{width:100%;height:220px;display:block;}
.prog-wrap{padding:10px 16px 14px;}
.prog-outer{height:10px;border-radius:99px;background:#f2f6f9;overflow:hidden;}
.prog-inner{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#6b7c93;font-weight:700;}
.prog-remain{color:#2E7D32;}
.celebration{display:none;position:absolute;inset:0;background:rgba(255,255,255,0.92);border-radius:20px;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.celebration.show{display:flex;}
.cel-emoji{font-size:48px;animation:bounce 0.6s ease infinite alternate;}
.cel-text{font-size:18px;font-weight:900;color:#18232f;margin-top:10px;}
.cel-sub{font-size:12px;color:#6b7c93;margin-top:4px;}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear infinite;opacity:0;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(260px) rotate(720deg);opacity:0}}
@keyframes climber-idle{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-3px) rotate(4deg)}}
@keyframes cloud-float{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}
@keyframes cloud2-float{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}
@keyframes flag-wave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes tree-sway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
.climber-group{animation:climber-idle 1.8s ease-in-out infinite;transform-origin:center bottom;}
.cloud{animation:cloud-float 4s ease-in-out infinite;}
.cloud2{animation:cloud2-float 5s ease-in-out infinite;}
.flag-wave{animation:flag-wave 1s ease-in-out infinite;transform-origin:left center;}
.tree{animation:tree-sway 3s ease-in-out infinite;transform-origin:center bottom;}
.tree2{animation:tree-sway 3.5s ease-in-out infinite 0.5s;transform-origin:center bottom;}
</style>

<div class="mtn-card" id="mtn-card">
  <div class="mtn-header">
    <div>
      <div class="mtn-label" id="mtn-label">🌿 N3への道のり</div>
      <div class="mtn-sublabel" id="mtn-sublabel">日本語能力試験 N3レベル達成まで</div>
    </div>
    <div class="score-badge">
      <div class="score-pts" id="score-display">0</div>
      <div class="score-max" id="score-max">/ 1000 pts</div>
    </div>
  </div>

  <svg class="mtn-canvas" id="mtn-svg" viewBox="0 0 390 220" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#B2DFDB" id="sky-top"/>
        <stop offset="100%" stop-color="#E8F5E9" id="sky-bot"/>
      </linearGradient>
      <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2E7D32" id="mtn-top"/>
        <stop offset="40%" stop-color="#4CAF6E" id="mtn-mid"/>
        <stop offset="100%" stop-color="#81C784" id="mtn-bot"/>
      </linearGradient>
      <linearGradient id="mtnBgGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#78909C" id="mtnbg-top"/>
        <stop offset="100%" stop-color="#B0BEC5" id="mtnbg-bot"/>
      </linearGradient>
      <linearGradient id="mtnShadow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </linearGradient>
      <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#388E3C" id="ground-top"/>
        <stop offset="100%" stop-color="#2E7D32" id="ground-bot"/>
      </linearGradient>
      <linearGradient id="progressLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFD54F"/>
        <stop offset="100%" stop-color="#FF8F00"/>
      </linearGradient>
      <filter id="treeShadow">
        <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.2)"/>
      </filter>
    </defs>

    <!-- Sky -->
    <rect width="390" height="220" fill="url(#skyGrad)"/>

    <!-- Stars (summit only) -->
    <g id="stars" opacity="0">
      <circle cx="195" cy="15" r="2" fill="#FFD54F" style="animation:twinkle 1.2s ease-in-out infinite;"/>
      <circle cx="172" cy="26" r="1.5" fill="#FFD54F" style="animation:twinkle 1.8s ease-in-out infinite 0.3s;"/>
      <circle cx="218" cy="22" r="1.5" fill="#FFD54F" style="animation:twinkle 1.5s ease-in-out infinite 0.6s;"/>
      <circle cx="155" cy="18" r="1" fill="white" style="animation:twinkle 2s ease-in-out infinite 0.9s;"/>
      <circle cx="235" cy="30" r="1" fill="white" style="animation:twinkle 2.2s ease-in-out infinite 0.4s;"/>
    </g>

    <!-- Background mountain (depth layer) -->
    <path d="M30 210 L160 55 L290 210 Z" fill="url(#mtnBgGrad)" opacity="0.5"/>
    <path d="M180 210 L285 75 L390 210 Z" fill="url(#mtnBgGrad)" opacity="0.35"/>

    <!-- Elevation bands on main mountain (texture) -->
    <clipPath id="mtnClip">
      <path id="mtn-clip-path" d="M0 220 L15 220 L195 22 L375 220 Z"/>
    </clipPath>
    <path id="mtn-body" d="M0 220 L15 220 L195 22 L375 220 Z" fill="url(#mtnGrad)"/>

    <!-- Elevation band lines -->
    <g clip-path="url(#mtnClip)" id="elev-bands" opacity="0.15">
      <line x1="0" y1="180" x2="390" y2="180" stroke="white" stroke-width="1.5"/>
      <line x1="0" y1="150" x2="390" y2="150" stroke="white" stroke-width="1.2"/>
      <line x1="0" y1="120" x2="390" y2="120" stroke="white" stroke-width="1"/>
      <line x1="0" y1="90" x2="390" y2="90" stroke="white" stroke-width="0.8"/>
    </g>

    <!-- Rocky ridges left side -->
    <path id="ridge-left" d="M15 220 L60 175 L80 185 L110 148 L130 160 L155 118 L170 128 L195 22"
          fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Rocky ridges right side -->
    <path id="ridge-right" d="M375 220 L330 175 L310 185 L280 148 L260 160 L235 118 L220 128 L195 22"
          fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Mountain shadow -->
    <path id="mtn-shadow" d="M195 22 L375 220 L300 220 Z" fill="url(#mtnShadow)"/>

    <!-- Snow cap -->
    <path id="snow-cap" d="M195 22 L173 68 Q185 55 195 50 Q205 55 217 68 Z" fill="white" opacity="0.95"/>
    <!-- Snow detail lines -->
    <path id="snow-detail" d="M185 52 Q195 45 205 52" fill="none" stroke="rgba(200,230,255,0.8)" stroke-width="1"/>

    <!-- Ground -->
    <rect x="0" y="208" width="390" height="12" fill="url(#groundGrad)" id="ground-color"/>

    <!-- Tree line left -->
    <g class="tree" style="transform-origin:55px 208px" filter="url(#treeShadow)">
      <polygon points="55,208 45,185 65,185" fill="#1B5E20" id="tree1a"/>
      <polygon points="55,192 43,172 67,172" fill="#2E7D32" id="tree1b"/>
      <polygon points="55,178 44,160 66,160" fill="#388E3C" id="tree1c"/>
      <rect x="52" y="205" width="6" height="6" fill="#4E342E" rx="1"/>
    </g>
    <g class="tree2" style="transform-origin:82px 208px" filter="url(#treeShadow)">
      <polygon points="82,208 74,190 90,190" fill="#1B5E20" id="tree2a"/>
      <polygon points="82,196 73,178 91,178" fill="#2E7D32" id="tree2b"/>
      <polygon points="82,183 74,167 90,167" fill="#388E3C" id="tree2c"/>
      <rect x="79" y="205" width="6" height="5" fill="#4E342E" rx="1"/>
    </g>
    <g class="tree" style="transform-origin:108px 208px" filter="url(#treeShadow)">
      <polygon points="108,208 99,188 117,188" fill="#1B5E20" id="tree3a"/>
      <polygon points="108,194 98,175 118,175" fill="#2E7D32" id="tree3b"/>
      <polygon points="108,180 99,163 117,163" fill="#388E3C" id="tree3c"/>
      <rect x="105" y="205" width="6" height="5" fill="#4E342E" rx="1"/>
    </g>

    <!-- Tree line right -->
    <g class="tree2" style="transform-origin:282px 208px" filter="url(#treeShadow)">
      <polygon points="282,208 273,188 291,188" fill="#1B5E20" id="tree4a"/>
      <polygon points="282,194 272,175 292,175" fill="#2E7D32" id="tree4b"/>
      <polygon points="282,180 273,163 291,163" fill="#388E3C" id="tree4c"/>
      <rect x="279" y="205" width="6" height="5" fill="#4E342E" rx="1"/>
    </g>
    <g class="tree" style="transform-origin:308px 208px" filter="url(#treeShadow)">
      <polygon points="308,208 299,190 317,190" fill="#1B5E20" id="tree5a"/>
      <polygon points="308,196 298,178 318,178" fill="#2E7D32" id="tree5b"/>
      <polygon points="308,183 300,167 316,167" fill="#388E3C" id="tree5c"/>
      <rect x="305" y="205" width="6" height="5" fill="#4E342E" rx="1"/>
    </g>
    <g class="tree2" style="transform-origin:335px 208px" filter="url(#treeShadow)">
      <polygon points="335,208 326,185 344,185" fill="#1B5E20" id="tree6a"/>
      <polygon points="335,192 324,172 346,172" fill="#2E7D32" id="tree6b"/>
      <polygon points="335,178 325,160 345,160" fill="#388E3C" id="tree6c"/>
      <rect x="332" y="205" width="6" height="6" fill="#4E342E" rx="1"/>
    </g>

    <!-- Clouds -->
    <g class="cloud" opacity="0.85">
      <ellipse cx="58" cy="42" rx="30" ry="13" fill="white"/>
      <ellipse cx="44" cy="50" rx="20" ry="11" fill="white"/>
      <ellipse cx="74" cy="50" rx="18" ry="10" fill="white"/>
      <ellipse cx="58" cy="55" rx="28" ry="9" fill="white"/>
    </g>
    <g class="cloud2" opacity="0.7">
      <ellipse cx="308" cy="34" rx="25" ry="11" fill="white"/>
      <ellipse cx="295" cy="41" rx="16" ry="9" fill="white"/>
      <ellipse cx="320" cy="41" rx="14" ry="8" fill="white"/>
      <ellipse cx="308" cy="46" rx="22" ry="8" fill="white"/>
    </g>
    <!-- Small distant cloud -->
    <g opacity="0.5" style="animation:cloud-float 6s ease-in-out infinite 1s">
      <ellipse cx="155" cy="28" rx="16" ry="6" fill="white"/>
      <ellipse cx="148" cy="33" rx="10" ry="5" fill="white"/>
      <ellipse cx="163" cy="33" rx="9" ry="5" fill="white"/>
    </g>

    <!-- Trail (dashed path up mountain) -->
    <path id="trail-full" d="M195 205 Q155 162 168 118 Q178 85 195 58"
          stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-dasharray="7,5" fill="none"/>

    <!-- Progress trail (gold) -->
    <path id="trail-progress" d="M195 205 Q155 162 168 118 Q178 85 195 58"
          stroke="url(#progressLine)" stroke-width="3.5" stroke-dasharray="200"
          stroke-dashoffset="200" fill="none"
          style="transition:stroke-dashoffset 1.4s cubic-bezier(0.34,1.2,0.64,1);filter:drop-shadow(0 0 5px rgba(255,180,0,0.7));"/>

    <!-- Climber -->
    <g id="climber" transform="translate(195,200)">
      <g class="climber-group">
        <ellipse cx="0" cy="-8" rx="6" ry="7" fill="#7BC5C5"/>
        <circle cx="0" cy="-19" r="6" fill="#FFCC80"/>
        <path d="M-5 -22 Q0 -31 5 -22 Z" fill="#5AABAB"/>
        <rect x="-7" y="-22" width="14" height="3" rx="1.5" fill="#5AABAB"/>
        <rect x="4" y="-15" width="5" height="7" rx="2" fill="#4a9e9e"/>
        <line x1="-3" y1="0" x2="-5" y2="9" stroke="#5AABAB" stroke-width="3" stroke-linecap="round"/>
        <line x1="3" y1="0" x2="5" y2="9" stroke="#5AABAB" stroke-width="3" stroke-linecap="round"/>
        <line x1="-5" y1="-8" x2="-9" y2="-2" stroke="#FFCC80" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="5" y1="-8" x2="9" y2="-2" stroke="#FFCC80" stroke-width="2.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Summit flag -->
    <g id="summit-flag" opacity="0" transform="translate(195,24)">
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#555" stroke-width="2"/>
      <path class="flag-wave" d="M0 -20 L14 -14 L0 -8 Z" fill="#F44336"/>
    </g>

  </svg>

  <div class="prog-wrap">
    <div class="prog-outer">
      <div class="prog-inner" id="prog-bar" style="width:0%;background:linear-gradient(90deg,#66BB7A,#2E7D32);"></div>
    </div>
    <div class="prog-meta">
      <span>現在: <strong id="current-pts">0</strong> pts</span>
      <span class="prog-remain" id="remain-pts">あと <strong>1000 pts</strong> で頂上！</span>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="cel-emoji">🎉</div>
    <div class="cel-text">おめでとう！</div>
    <div class="cel-sub" id="cel-sub">N3の山を制覇しました！</div>
    <div style="margin-top:12px;font-size:22px;">🏔✨🎌</div>
  </div>
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var userScore = parseInt(params.get("score")) || 0;
  var userPhase = params.get("phase") || "n3";
  var maxScore = parseInt(params.get("max")) || 1000;

  var themes = {
    n3:{
      label:'🌿 N3への道のり',sub:'日本語能力試験 N3レベル達成まで',
      skyTop:'#B2DFDB',skyBot:'#E8F5E9',
      mtnTop:'#2E7D32',mtnMid:'#4CAF6E',mtnBot:'#81C784',
      mtnBgTop:'#78909C',mtnBgBot:'#B0BEC5',
      groundTop:'#388E3C',groundBot:'#2E7D32',
      bar:'linear-gradient(90deg,#66BB7A,#2E7D32)',
      celSub:'N3の山を制覇しました！',
      remainColor:'#2E7D32',
      treeColors:['#1B5E20','#2E7D32','#388E3C'],
      mtnPath:'M0 220 L15 220 L195 22 L375 220 Z',
      clipPath:'M0 220 L15 220 L195 22 L375 220 Z',
      shadowPath:'M195 22 L375 220 L300 220 Z',
      snowPath:'M195 22 L173 68 Q185 55 195 50 Q205 55 217 68 Z',
      trailPath:'M195 205 Q155 162 168 118 Q178 85 195 58',
      ridgeLeft:'M15 220 L60 175 L80 185 L110 148 L130 160 L155 118 L170 128 L195 22',
      ridgeRight:'M375 220 L330 175 L310 185 L280 148 L260 160 L235 118 L220 128 L195 22'
    },
    n2:{
      label:'🔮 N2への道のり',sub:'日本語能力試験 N2レベル達成まで',
      skyTop:'#CE93D8',skyBot:'#EDE7F6',
      mtnTop:'#4A148C',mtnMid:'#7B52AB',mtnBot:'#B39DDB',
      mtnBgTop:'#5C6BC0',mtnBgBot:'#9FA8DA',
      groundTop:'#6A1B9A',groundBot:'#4A148C',
      bar:'linear-gradient(90deg,#9575CD,#4A148C)',
      celSub:'N2の山を制覇しました！',
      remainColor:'#4A148C',
      treeColors:['#4A148C','#6A1B9A','#7B1FA2'],
      mtnPath:'M0 220 L15 220 L140 128 L158 108 L175 85 L185 58 L195 22 L205 58 L218 82 L238 108 L258 128 L375 220 Z',
      clipPath:'M0 220 L15 220 L140 128 L158 108 L175 85 L185 58 L195 22 L205 58 L218 82 L238 108 L258 128 L375 220 Z',
      shadowPath:'M205 58 L375 220 L300 220 Z',
      snowPath:'M195 22 L176 65 Q188 52 195 48 Q202 52 214 65 Z',
      trailPath:'M195 205 Q155 162 168 118 Q178 85 195 58',
      ridgeLeft:'M15 220 L55 178 L75 188 L105 152 L125 162 L152 122 L168 132 L195 22',
      ridgeRight:'M375 220 L335 178 L315 188 L285 152 L265 162 L238 122 L222 132 L195 22'
    },
    kaigo:{
      label:'🌋 介護福祉士への道のり',sub:'介護福祉資格取得まで',
      skyTop:'#EF9A9A',skyBot:'#FDE8E6',
      mtnTop:'#B71C1C',mtnMid:'#E53935',mtnBot:'#EF9A9A',
      mtnBgTop:'#8D6E63',mtnBgBot:'#BCAAA4',
      groundTop:'#C62828',groundBot:'#B71C1C',
      bar:'linear-gradient(90deg,#EF5350,#B71C1C)',
      celSub:'介護福祉資格への山を制覇しました！',
      remainColor:'#B71C1C',
      treeColors:['#4E342E','#5D4037','#6D4C41'],
      mtnPath:'M0 220 L15 220 L148 98 L172 52 L185 32 L195 18 L205 32 L218 52 L242 98 L375 220 Z',
      clipPath:'M0 220 L15 220 L148 98 L172 52 L185 32 L195 18 L205 32 L218 52 L242 98 L375 220 Z',
      shadowPath:'M205 32 L375 220 L305 220 Z',
      snowPath:'M195 18 L177 55 Q188 42 195 38 Q202 42 213 55 Z',
      trailPath:'M195 205 Q158 162 168 118 Q178 85 195 55',
      ridgeLeft:'M15 220 L55 178 L72 188 L100 155 L118 165 L148 125 L165 135 L195 18',
      ridgeRight:'M375 220 L335 178 L318 188 L290 155 L272 165 L242 125 L225 135 L195 18'
    }
  };

  var level = userPhase === '介護福祉' ? 'kaigo' : (userPhase === 'N2' ? 'n2' : 'n3');
  var t = themes[level];

  function applyTheme(){
    document.getElementById('mtn-label').textContent = t.label;
    document.getElementById('mtn-sublabel').textContent = t.sub;
    document.getElementById('cel-sub').textContent = t.celSub;
    document.getElementById('sky-top').setAttribute('stop-color', t.skyTop);
    document.getElementById('sky-bot').setAttribute('stop-color', t.skyBot);
    document.getElementById('mtn-top').setAttribute('stop-color', t.mtnTop);
    document.getElementById('mtn-mid').setAttribute('stop-color', t.mtnMid);
    document.getElementById('mtn-bot').setAttribute('stop-color', t.mtnBot);
    document.getElementById('mtnbg-top').setAttribute('stop-color', t.mtnBgTop);
    document.getElementById('mtnbg-bot').setAttribute('stop-color', t.mtnBgBot);
    document.getElementById('ground-top').setAttribute('stop-color', t.groundTop);
    document.getElementById('ground-bot').setAttribute('stop-color', t.groundBot);
    document.getElementById('prog-bar').style.background = t.bar;
    document.getElementById('remain-pts').style.color = t.remainColor;
    document.getElementById('mtn-body').setAttribute('d', t.mtnPath);
    document.getElementById('mtn-clip-path').setAttribute('d', t.clipPath);
    document.getElementById('mtn-shadow').setAttribute('d', t.shadowPath);
    document.getElementById('snow-cap').setAttribute('d', t.snowPath);
    document.getElementById('trail-full').setAttribute('d', t.trailPath);
    document.getElementById('trail-progress').setAttribute('d', t.trailPath);
    document.getElementById('ridge-left').setAttribute('d', t.ridgeLeft);
    document.getElementById('ridge-right').setAttribute('d', t.ridgeRight);
    // Tree colors
    var tc = t.treeColors;
    ['tree1a','tree2a','tree3a','tree4a','tree5a','tree6a'].forEach(function(id){ var el=document.getElementById(id); if(el) el.setAttribute('fill',tc[0]); });
    ['tree1b','tree2b','tree3b','tree4b','tree5b','tree6b'].forEach(function(id){ var el=document.getElementById(id); if(el) el.setAttribute('fill',tc[1]); });
    ['tree1c','tree2c','tree3c','tree4c','tree5c','tree6c'].forEach(function(id){ var el=document.getElementById(id); if(el) el.setAttribute('fill',tc[2]); });
  }

  function update(){
    var pct = Math.min(userScore / maxScore, 1);
    var cx = 195 + (pct < 0.5 ? (pct * -32) : (-16 + (pct-0.5)*32));
    var cy = 200 - (pct * 152);
    document.getElementById('climber').setAttribute('transform','translate('+cx+','+cy+')');
    document.getElementById('trail-progress').style.strokeDashoffset = 200*(1-pct);
    document.getElementById('prog-bar').style.width = (pct*100)+'%';
    document.getElementById('score-display').textContent = userScore;
    document.getElementById('score-max').textContent = '/ '+maxScore+' pts';
    document.getElementById('current-pts').textContent = userScore;
    var remain = maxScore - userScore;
    document.getElementById('remain-pts').innerHTML = remain > 0
      ? 'あと <strong>'+remain+' pts</strong> で頂上！'
      : '<strong>🎉 頂上達成！</strong>';
    if(pct >= 1){
      document.getElementById('summit-flag').setAttribute('opacity','1');
      document.getElementById('stars').setAttribute('opacity','1');
      showCelebration();
    }
  }

  function showCelebration(){
    var cel = document.getElementById('celebration');
    cel.classList.add('show');
    var wrap = document.getElementById('confetti-wrap');
    wrap.innerHTML = '';
    var colors=['#7BC5C5','#8FD5B0','#FFD54F','#F44336','#7B52AB','#66BB7A','#FF8A65'];
    for(var i=0;i<30;i++){
      var el=document.createElement('div');
      el.className='confetti-piece';
      el.style.left=Math.random()*100+'%';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius=Math.random()>0.5?'50%':'2px';
      el.style.animationDuration=(1.5+Math.random()*2)+'s';
      el.style.animationDelay=(Math.random()*1.5)+'s';
      el.style.width=(6+Math.random()*5)+'px';
      el.style.height=(6+Math.random()*5)+'px';
      wrap.appendChild(el);
    }
    setTimeout(function(){cel.classList.remove('show');},4000);
  }

  applyTheme();
  update();
})();
</script>
