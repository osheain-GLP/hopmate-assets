<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
.mtn-card{background:white;border-radius:20px;overflow:hidden;border:1px solid #e4eaf0;margin:0 0 16px 0;position:relative;font-family:sans-serif;}
.mtn-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.mtn-label{font-size:13px;font-weight:700;color:#18232f;}
.mtn-sublabel{font-size:11px;color:#6b7c93;margin-top:2px;}
.score-badge{background:#f2f6f9;border-radius:12px;padding:6px 12px;text-align:center;}
.score-pts{font-size:18px;font-weight:900;color:#18232f;font-family:'Nunito',sans-serif;}
.score-max{font-size:11px;color:#6b7c93;}
.mtn-canvas{width:100%;height:200px;display:block;}
.prog-wrap{padding:10px 16px 14px;}
.prog-outer{height:10px;border-radius:99px;background:#f2f6f9;overflow:hidden;}
.prog-inner{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#6b7c93;font-weight:700;}
.prog-remain{color:#2E7D32;}
.celebration{display:none;position:absolute;inset:0;background:rgba(255,255,255,0.92);border-radius:20px;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.celebration.show{display:flex;}
.cel-emoji{font-size:48px;animation:bounce 0.6s ease infinite alternate;}
.cel-text{font-size:18px;font-weight:900;color:#18232f;margin-top:10px;}
.cel-sub{font-size:12px;color:#6b7c93;margin-top:4px;}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear infinite;opacity:0;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(240px) rotate(720deg);opacity:0}}
@keyframes climber-idle{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-3px) rotate(4deg)}}
@keyframes cloud-float{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes flag-wave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:0.2}}
.climber-group{animation:climber-idle 1.8s ease-in-out infinite;transform-origin:center bottom;}
.cloud{animation:cloud-float 4s ease-in-out infinite;}
.cloud2{animation:cloud-float 5s ease-in-out infinite reverse;}
.flag-wave{animation:flag-wave 1s ease-in-out infinite;transform-origin:left center;}
</style>

<div class="mtn-card" id="mtn-card">
  <div class="mtn-header">
    <div>
      <div class="mtn-label" id="mtn-label">🌿 N3への道のり</div>
      <div class="mtn-sublabel" id="mtn-sublabel">日本語能力試験 N3レベル達成まで</div>
    </div>
    <div class="score-badge">
      <div class="score-pts" id="score-display">0</div>
      <div class="score-max" id="score-max">/ 1000 pts</div>
    </div>
  </div>

  <svg class="mtn-canvas" id="mtn-svg" viewBox="0 0 390 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E8F5E9" id="sky-top"/>
        <stop offset="100%" stop-color="#F1F8E9" id="sky-bot"/>
      </linearGradient>
      <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4CAF6E" id="mtn-top"/>
        <stop offset="60%" stop-color="#66BB7A" id="mtn-mid"/>
        <stop offset="100%" stop-color="#A5D6A7" id="mtn-bot"/>
      </linearGradient>
      <linearGradient id="mtnShadow" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(0,0,0,0.12)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </linearGradient>
      <linearGradient id="progressLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFD54F"/>
        <stop offset="100%" stop-color="#FF8F00"/>
      </linearGradient>
    </defs>
    <rect width="390" height="200" fill="url(#skyGrad)"/>
    <g class="cloud" opacity="0.7">
      <ellipse cx="55" cy="38" rx="26" ry="11" fill="white"/>
      <ellipse cx="44" cy="46" rx="16" ry="9" fill="white"/>
      <ellipse cx="70" cy="46" rx="14" ry="8" fill="white"/>
    </g>
    <g class="cloud2" opacity="0.5">
      <ellipse cx="305" cy="30" rx="20" ry="8" fill="white"/>
      <ellipse cx="295" cy="36" rx="13" ry="7" fill="white"/>
      <ellipse cx="316" cy="36" rx="11" ry="6" fill="white"/>
    </g>
    <g id="stars" opacity="0">
      <circle cx="195" cy="15" r="2" fill="#FFD54F" style="animation:twinkle 1.2s ease-in-out infinite;"/>
      <circle cx="172" cy="24" r="1.5" fill="#FFD54F" style="animation:twinkle 1.8s ease-in-out infinite 0.3s;"/>
      <circle cx="218" cy="21" r="1.5" fill="#FFD54F" style="animation:twinkle 1.5s ease-in-out infinite 0.6s;"/>
    </g>
    <path id="mtn-body" d="M0 200 L100 200 L195 25 L290 200 L390 200 Z" fill="url(#mtnGrad)"/>
    <path id="mtn-shadow" d="M195 25 L290 200 L245 200 Z" fill="url(#mtnShadow)"/>
    <path id="snow-cap" d="M195 25 L175 68 Q195 58 215 68 Z" fill="white" opacity="0.9"/>
    <rect x="0" y="192" width="390" height="8" fill="#A5D6A7" id="ground-color"/>
    <path id="trail-full" d="M195 192 Q160 155 173 118 Q180 90 195 62"
          stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,5" fill="none"/>
    <path id="trail-progress" d="M195 192 Q160 155 173 118 Q180 90 195 62"
          stroke="url(#progressLine)" stroke-width="3" stroke-dasharray="200"
          stroke-dashoffset="200" fill="none"
          style="transition:stroke-dashoffset 1.4s cubic-bezier(0.34,1.2,0.64,1);filter:drop-shadow(0 0 4px rgba(255,180,0,0.6));"/>
    <g id="climber" transform="translate(195,188)">
      <g class="climber-group">
        <ellipse cx="0" cy="-8" rx="6" ry="7" fill="#7BC5C5"/>
        <circle cx="0" cy="-19" r="6" fill="#FFCC80"/>
        <path d="M-5 -22 Q0 -30 5 -22 Z" fill="#5AABAB"/>
        <rect x="-7" y="-22" width="14" height="3" rx="1.5" fill="#5AABAB"/>
        <rect x="4" y="-15" width="5" height="7" rx="2" fill="#4a9e9e"/>
        <line x1="-3" y1="0" x2="-5" y2="8" stroke="#5AABAB" stroke-width="3" stroke-linecap="round"/>
        <line x1="3" y1="0" x2="5" y2="8" stroke="#5AABAB" stroke-width="3" stroke-linecap="round"/>
        <line x1="-5" y1="-8" x2="-9" y2="-2" stroke="#FFCC80" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="5" y1="-8" x2="9" y2="-2" stroke="#FFCC80" stroke-width="2.5" stroke-linecap="round"/>
      </g>
    </g>
    <g id="summit-flag" opacity="0" transform="translate(195,27)">
      <line x1="0" y1="0" x2="0" y2="-18" stroke="#333" stroke-width="2"/>
      <path class="flag-wave" d="M0 -18 L13 -12 L0 -6 Z" fill="#F44336"/>
    </g>
  </svg>

  <div class="prog-wrap">
    <div class="prog-outer">
      <div class="prog-inner" id="prog-bar" style="width:0%;background:linear-gradient(90deg,#66BB7A,#4CAF6E);"></div>
    </div>
    <div class="prog-meta">
      <span>現在: <strong id="current-pts">0</strong> pts</span>
      <span class="prog-remain" id="remain-pts">あと <strong>1000 pts</strong> で頂上！</span>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="cel-emoji">🎉</div>
    <div class="cel-text">おめでとう！</div>
    <div class="cel-sub" id="cel-sub">N3の山を制覇しました！</div>
    <div style="margin-top:12px;font-size:22px;">🏔✨🎌</div>
  </div>
</div>

<script>
(function(){
  // ---- BUBBLE INJECTS THESE VALUES ----
  var params = new URLSearchParams(window.location.search);
  var userScore = parseInt(params.get("score")) || 0;
  var userPhase = params.get("phase") || "n3";
  var maxScore = parseInt(params.get("max")) || 1000;
  // -------------------------------------

  var themes = {
    n3:{label:'🌿 N3への道のり',sub:'日本語能力試験 N3レベル達成まで',skyTop:'#E8F5E9',skyBot:'#F1F8E9',mtnTop:'#4CAF6E',mtnMid:'#66BB7A',mtnBot:'#A5D6A7',ground:'#A5D6A7',bar:'linear-gradient(90deg,#66BB7A,#4CAF6E)',celSub:'N3の山を制覇しました！',mtnPath:'M0 200 L100 200 L195 25 L290 200 L390 200 Z',shadowPath:'M195 25 L290 200 L245 200 Z',snowPath:'M195 25 L175 68 Q195 58 215 68 Z',trailPath:'M195 192 Q160 155 173 118 Q180 90 195 62'},
    n2:{label:'🔮 N2への道のり',sub:'日本語能力試験 N2レベル達成まで',skyTop:'#EDE7F6',skyBot:'#F3E5F5',mtnTop:'#7B52AB',mtnMid:'#9575CD',mtnBot:'#B39DDB',ground:'#B39DDB',bar:'linear-gradient(90deg,#9575CD,#7B52AB)',celSub:'N2の山を制覇しました！',mtnPath:'M0 200 L90 200 L140 120 L160 100 L175 80 L185 55 L195 25 L205 55 L218 78 L235 100 L255 120 L300 200 L390 200 Z',shadowPath:'M205 55 L300 200 L255 200 Z',snowPath:'M195 25 L178 65 Q195 54 212 65 Z',trailPath:'M195 192 Q158 150 168 112 Q178 85 195 58'},
    kaigo:{label:'🌋 介護福祉士への道のり',sub:'介護福祉資格取得まで',skyTop:'#FDE8E6',skyBot:'#FFF3E0',mtnTop:'#C0392B',mtnMid:'#E74C3C',mtnBot:'#F1948A',ground:'#F1948A',bar:'linear-gradient(90deg,#E74C3C,#C0392B)',celSub:'介護福祉資格への山を制覇しました！',mtnPath:'M0 200 L80 200 L158 95 L182 28 L195 18 L208 28 L232 95 L310 200 L390 200 Z',shadowPath:'M208 28 L310 200 L265 200 Z',snowPath:'M195 18 L178 52 Q195 40 212 52 Z',trailPath:'M195 192 Q162 158 169 122 Q178 92 195 58'}
  };

  var level = userPhase === '介護福祉' ? 'kaigo' : (userPhase === 'N2' ? 'n2' : 'n3');
  // Also check if score-based unlock needed — kept simple: phase drives level
  
  function applyTheme(t){
    document.getElementById('mtn-label').textContent = t.label;
    document.getElementById('mtn-sublabel').textContent = t.sub;
    document.getElementById('cel-sub').textContent = t.celSub;
    document.getElementById('sky-top').setAttribute('stop-color', t.skyTop);
    document.getElementById('sky-bot').setAttribute('stop-color', t.skyBot);
    document.getElementById('mtn-top').setAttribute('stop-color', t.mtnTop);
    document.getElementById('mtn-mid').setAttribute('stop-color', t.mtnMid);
    document.getElementById('mtn-bot').setAttribute('stop-color', t.mtnBot);
    document.getElementById('ground-color').setAttribute('fill', t.ground);
    document.getElementById('prog-bar').style.background = t.bar;
    document.getElementById('mtn-body').setAttribute('d', t.mtnPath);
    document.getElementById('mtn-shadow').setAttribute('d', t.shadowPath);
    document.getElementById('snow-cap').setAttribute('d', t.snowPath);
    document.getElementById('trail-full').setAttribute('d', t.trailPath);
    document.getElementById('trail-progress').setAttribute('d', t.trailPath);
  }

  function update(){
    var pct = Math.min(userScore / maxScore, 1);
    var cx = 195 + (pct < 0.5 ? (pct * -30) : (-15 + (pct-0.5)*30));
    var cy = 188 - (pct * 140);
    document.getElementById('climber').setAttribute('transform','translate('+cx+','+cy+')');
    document.getElementById('trail-progress').style.strokeDashoffset = 200*(1-pct);
    document.getElementById('prog-bar').style.width = (pct*100)+'%';
    document.getElementById('score-display').textContent = userScore;
    document.getElementById('score-max').textContent = '/ '+maxScore+' pts';
    document.getElementById('current-pts').textContent = userScore;
    var remain = maxScore - userScore;
    document.getElementById('remain-pts').innerHTML = remain > 0
      ? 'あと <strong>'+remain+' pts</strong> で頂上！'
      : '<strong>🎉 頂上達成！</strong>';
    if(pct >= 1){
      document.getElementById('summit-flag').setAttribute('opacity','1');
      document.getElementById('stars').setAttribute('opacity','1');
      showCelebration();
    }
  }

  function showCelebration(){
    var cel = document.getElementById('celebration');
    cel.classList.add('show');
    var wrap = document.getElementById('confetti-wrap');
    wrap.innerHTML = '';
    var colors=['#7BC5C5','#8FD5B0','#FFD54F','#F44336','#7B52AB','#66BB7A','#FF8A65'];
    for(var i=0;i<28;i++){
      var el=document.createElement('div');
      el.className='confetti-piece';
      el.style.left=Math.random()*100+'%';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius=Math.random()>0.5?'50%':'2px';
      el.style.animationDuration=(1.5+Math.random()*2)+'s';
      el.style.animationDelay=(Math.random()*1.5)+'s';
      el.style.width=(6+Math.random()*5)+'px';
      el.style.height=(6+Math.random()*5)+'px';
      wrap.appendChild(el);
    }
    setTimeout(function(){cel.classList.remove('show');},4000);
  }

  applyTheme(themes[level]);
  update();
})();
</script>
